openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agent
    description: AI code generation operations
  - name: gateway
    description: Layer 8 Intelligence Gateway operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agent/generate:
    post:
      operationId: agentGenerate
      tags: [agent]
      summary: Generate async API code
      description: |
        Accepts a plain-English prompt and streams the AI-generated
        TypeScript async Express route handler as Server-Sent Events.
        On completion, the code is saved as a gzip-compressed file
        in the Agent/ directory. PII is redacted before sending to
        the model. Semantic cache is checked first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentGenerateBody"
      responses:
        "200":
          description: SSE stream of generated code tokens
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request or prompt injection detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Token-per-minute rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agent/history:
    get:
      operationId: agentHistory
      tags: [agent]
      summary: List past generations
      description: Returns all previously generated files, newest first.
      responses:
        "200":
          description: List of generation records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GenerationRecord"

  /gateway/stats:
    get:
      operationId: gatewayStats
      tags: [gateway]
      summary: Gateway aggregate statistics
      description: |
        Returns aggregate statistics for the Layer 8 gateway including
        cache hit rate, total token usage, estimated cost, and TTFT.
      responses:
        "200":
          description: Gateway statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AgentGenerateBody:
      type: object
      properties:
        prompt:
          type: string
          description: Plain-English description of the API to generate
      required:
        - prompt

    GenerationRecord:
      type: object
      properties:
        id:
          type: integer
        prompt:
          type: string
        filename:
          type: string
        tokenCountPrompt:
          type: integer
          nullable: true
        tokenCountCompletion:
          type: integer
          nullable: true
        costUsd:
          type: number
          nullable: true
        ttftMs:
          type: integer
          nullable: true
        modelUsed:
          type: string
          nullable: true
        cacheHit:
          type: boolean
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - prompt
        - filename
        - createdAt

    GatewayStats:
      type: object
      properties:
        totalRequests:
          type: integer
          description: Total number of generation requests
        cacheHits:
          type: integer
          description: Number of requests served from semantic cache
        cacheHitRate:
          type: number
          description: Cache hit rate as a fraction (0-1)
        totalTokens:
          type: integer
          description: Total tokens consumed (prompt + completion)
        totalCostUsd:
          type: number
          description: Total estimated cost in USD
        avgTtftMs:
          type: number
          nullable: true
          description: Average time to first token in milliseconds (non-cached only)
        tpmWindowTotal:
          type: integer
          description: Tokens consumed in the current 60-second window
        tpmLimit:
          type: integer
          description: Configured tokens-per-minute limit
      required:
        - totalRequests
        - cacheHits
        - cacheHitRate
        - totalTokens
        - totalCostUsd
        - avgTtftMs
        - tpmWindowTotal
        - tpmLimit

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
      required:
        - error
